<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#9B0000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maroon Match – Discuss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="common.js"></script>
  <style>
    /* ── Post card ──────────────────────────────────────────────────────── */
    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      transition: border-color .15s, transform .1s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .post-card:hover { border-color: rgba(155,0,0,.4); transform: translateY(-1px); }

    .post-meta { display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap; }
    .post-cat  { background:rgba(155,0,0,.12);color:#FECACA;border:1px solid rgba(155,0,0,.25);border-radius:999px;padding:2px 10px;font-size:11px;font-weight:600; }
    .post-title { font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.4; }
    .post-body  { font-size:14px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden; }
    .post-footer{ display:flex;align-items:center;gap:14px;margin-top:12px;font-size:13px;color:var(--muted); }
    .post-footer span { display:flex;align-items:center;gap:4px; }

    /* ── Upvote btn ─────────────────────────────────────────────────────── */
    .upvote-btn {
      display:flex;align-items:center;gap:4px;padding:4px 12px;
      border-radius:999px;border:1px solid var(--border);background:none;
      color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;
      transition:all .15s;
    }
    .upvote-btn:hover,
    .upvote-btn.voted { background:rgba(155,0,0,.12);border-color:rgba(155,0,0,.35);color:#FECACA; }

    /* ── Anon badge ─────────────────────────────────────────────────────── */
    .anon-badge { background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:999px;padding:2px 10px;font-size:11px;font-weight:600;color:var(--muted); }

    /* ── Reaction bar (anon posts) ──────────────────────────────────────── */
    .reaction-bar { display:flex;gap:6px;flex-wrap:wrap;margin-top:10px; }
    .react-btn {
      padding:4px 12px;border-radius:999px;border:1px solid var(--border);
      background:none;font-size:14px;cursor:pointer;transition:all .15s;
      display:flex;align-items:center;gap:4px;color:var(--muted);font-weight:500;
    }
    .react-btn:hover { background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.2); }
    .react-btn.reacted { background:rgba(155,0,0,.12);border-color:rgba(155,0,0,.3);color:#FECACA; }

    /* ── New post modal ─────────────────────────────────────────────────── */
    .modal-backdrop { position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;backdrop-filter:blur(4px); }
    .modal-box { width:100%;max-width:520px;max-height:85vh;overflow-y:auto;padding:32px; }

    /* ── Category row ───────────────────────────────────────────────────── */
    .cat-scroll { display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:20px; }
    .cat-scroll::-webkit-scrollbar { display:none; }
    .cat-pill {
      padding:5px 16px;border-radius:999px;font-size:12px;font-weight:600;
      border:1px solid var(--border);background:var(--surface);color:var(--muted);
      cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;
    }
    .cat-pill.active { background:linear-gradient(135deg,#9B0000,#C1272D);border-color:transparent;color:white; }
    .cat-pill:hover:not(.active) { border-color:rgba(155,0,0,.4);color:var(--text); }

    /* ── Sort bar ───────────────────────────────────────────────────────── */
    .sort-select { background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:5px 10px;cursor:pointer; }

    /* ── Empty ──────────────────────────────────────────────────────────── */
    .empty-state { text-align:center;padding:60px 24px;color:var(--muted); }
    .empty-state .icon { font-size:44px;margin-bottom:14px; }
    .empty-state h3 { font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px; }

    /* ── FAB ────────────────────────────────────────────────────────────── */
    #fab {
      position:fixed;bottom:88px;right:20px;z-index:40;
      width:52px;height:52px;border-radius:50%;
      background:linear-gradient(135deg,#9B0000,#C1272D);
      color:white;font-size:26px;font-weight:300;border:none;cursor:pointer;
      box-shadow:0 4px 24px rgba(155,0,0,.5);
      display:flex;align-items:center;justify-content:center;
      transition:transform .15s,box-shadow .15s;
    }
    #fab:hover { transform:scale(1.08);box-shadow:0 6px 32px rgba(155,0,0,.6); }
    @media (min-width:641px) { #fab { bottom:28px; } }
  </style>
</head>
<body>

  <nav class="glass-nav">
    <div style="max-width:1100px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;">
      <a href="index.html" style="font-size:18px;font-weight:800;letter-spacing:-.02em;text-decoration:none;color:inherit;">Maroon <span class="grad-text">Match</span></a>
      <div class="desktop-links" style="display:flex;gap:8px;align-items:center;">
        <a href="vote.html"        style="color:var(--muted);text-decoration:none;font-size:14px;padding:6px 12px;border-radius:8px;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Vote</a>
        <a href="leaderboard.html" style="color:var(--muted);text-decoration:none;font-size:14px;padding:6px 12px;border-radius:8px;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Leaderboard</a>
        <a href="parties.html" style="color:var(--muted);text-decoration:none;font-size:14px;padding:6px 12px;border-radius:8px;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Parties</a>
        <div id="nav-actions" style="display:flex;gap:8px;align-items:center;"></div>
      </div>
    </div>
  </nav>

  <div style="max-width:760px;margin:0 auto;padding:32px 24px 100px;">

    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <div>
        <h1 style="font-size:clamp(22px,4vw,32px);font-weight:900;letter-spacing:-.02em;margin-bottom:4px;">Campus Discuss</h1>
        <p style="color:var(--muted);font-size:14px;">What's happening at UChicago</p>
      </div>
      <button onclick="openNewPost()" class="btn-accent" style="font-size:14px;padding:10px 20px;">+ New Post</button>
    </div>

    <!-- Board tabs -->
    <div class="tab-bar" style="max-width:320px;margin-bottom:20px;">
      <button class="tab-btn active" onclick="switchBoard('anon')">🎭 Anonymous</button>
      <button class="tab-btn" onclick="switchBoard('reddit')">🏛 Campus Feed</button>
    </div>

    <!-- Category filter -->
    <div class="cat-scroll" id="cat-row">
      <button class="cat-pill active" data-cat="" onclick="selectCat('')">All</button>
    </div>

    <!-- Sort + count -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <p id="post-count" style="font-size:13px;color:var(--muted);"></p>
      <select class="sort-select" id="sort-sel" onchange="setSort(this.value)">
        <option value="new">Newest</option>
        <option value="top">Top Voted</option>
        <option value="hot">Hot</option>
      </select>
    </div>

    <!-- Posts list -->
    <div id="posts-list" style="display:flex;flex-direction:column;gap:10px;"></div>

    <!-- Load more -->
    <div style="text-align:center;margin-top:24px;">
      <button id="load-more-btn" onclick="loadMore()" class="btn-ghost" style="display:none;font-size:14px;padding:10px 28px;">Load more</button>
    </div>

  </div>

  <!-- FAB for mobile -->
  <button id="fab" onclick="openNewPost()" title="New post">+</button>

  <!-- Mobile nav -->
  <nav class="mobile-nav">
    <a href="vote.html" class="mobile-nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Vote</a>
    <a href="discuss.html" class="mobile-nav-item active"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>Discuss</a>
    <a href="parties.html" class="mobile-nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>Parties</a>
    <a href="profile.html" class="mobile-nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Profile</a>
  </nav>

  <!-- New Post Modal -->
  <div id="new-post-modal" class="modal-backdrop" style="display:none;">
    <div class="glass-card modal-box">
      <h3 style="font-size:20px;font-weight:800;margin-bottom:6px;" id="modal-title">New Post</h3>
      <p style="color:var(--muted);font-size:14px;margin-bottom:20px;" id="modal-subtitle"></p>

      <!-- Type selector -->
      <div style="display:flex;gap:8px;margin-bottom:20px;" id="type-selector">
        <button class="tab-btn active" style="flex:1;" onclick="setPostType('anon')">🎭 Anonymous</button>
        <button class="tab-btn" style="flex:1;" onclick="setPostType('reddit')">🏛 Campus Feed</button>
      </div>

      <!-- Title (reddit only) -->
      <div id="title-wrap" style="display:none;margin-bottom:14px;">
        <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500;">Title</label>
        <input id="post-title-input" class="input" type="text" maxlength="120" placeholder="What's on your mind?" />
      </div>

      <!-- Content -->
      <div style="margin-bottom:14px;">
        <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500;">Content</label>
        <textarea id="post-content-input" class="input" maxlength="2000" rows="5"
          placeholder="Share something with UChicago students…"
          style="resize:vertical;line-height:1.6;"></textarea>
        <p id="char-count" style="font-size:11px;color:var(--muted);text-align:right;margin-top:4px;"></p>
      </div>

      <!-- Category -->
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500;">Category</label>
        <select id="post-cat-input" class="input" style="cursor:pointer;">
          <option value="General">General</option>
        </select>
      </div>

      <p id="post-error" style="color:#f87171;font-size:13px;display:none;margin-bottom:12px;"></p>

      <div style="display:flex;gap:10px;">
        <button onclick="submitPost()" class="btn-accent" style="flex:1;">Post</button>
        <button onclick="closeNewPost()" class="btn-ghost" style="padding:12px 20px;">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const CATEGORIES = ['Pre-Med','CS / Tech','Economics','Law / Policy','Arts','Athletics','Greek Life','RSO','Dorms','International','Grad Student','First Year']
    const EMOJIS = ['🔥','💀','😭','👀','💯','🙏','😂','🤔']

    let currentBoard = 'anon'
    let currentCat   = ''
    let currentSort  = 'new'
    let currentUser  = null
    let page         = 0
    let hasMore      = true
    let postType     = 'anon'
    let myReactions  = {}  // post_id → Set of emojis
    let myVotes      = {}  // post_id → 1/-1
    const PAGE_SIZE  = 15

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {})
    initNav()

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      const { data: { user } } = await getSupabase().auth.getUser()
      if (!user) { window.location.href = 'index.html'; return }
      currentUser = user

      buildCatChips()
      populateCatSelect()
      await loadPosts(true)
      subscribeNewPosts()
    }

    function buildCatChips() {
      const row = document.getElementById('cat-row')
      CATEGORIES.forEach(c => {
        const btn = document.createElement('button')
        btn.className = 'cat-pill'; btn.dataset.cat = c; btn.textContent = c
        btn.onclick = () => selectCat(c)
        row.appendChild(btn)
      })
    }

    function populateCatSelect() {
      const sel = document.getElementById('post-cat-input')
      CATEGORIES.forEach(c => {
        const opt = document.createElement('option')
        opt.value = c; opt.textContent = c
        sel.appendChild(opt)
      })
    }

    // ── Board / filter ────────────────────────────────────────────────────────
    function switchBoard(board) {
      currentBoard = board
      document.querySelectorAll('.tab-btn').forEach((b, i) =>
        b.classList.toggle('active', ['anon','reddit'][i] === board)
      )
      page = 0; hasMore = true
      loadPosts(true)
    }

    function selectCat(cat) {
      currentCat = cat
      document.querySelectorAll('.cat-pill').forEach(b =>
        b.classList.toggle('active', b.dataset.cat === cat)
      )
      page = 0; hasMore = true
      loadPosts(true)
    }

    function setSort(s) {
      currentSort = s; page = 0; hasMore = true; loadPosts(true)
    }

    // ── Load posts ────────────────────────────────────────────────────────────
    async function loadPosts(reset = false) {
      if (reset) {
        document.getElementById('posts-list').innerHTML = renderSkeletons()
        document.getElementById('load-more-btn').style.display = 'none'
      }

      const sb = getSupabase()
      let query = sb.from('posts')
        .select('id,author_id,is_anonymous,title,content,category,post_type,upvotes,comment_count,created_at,profiles(username,photo_url)')
        .eq('post_type', currentBoard)
        .range(page * PAGE_SIZE, (page + 1) * PAGE_SIZE - 1)

      if (currentCat) query = query.eq('category', currentCat)
      if (currentSort === 'new') query = query.order('created_at', { ascending: false })
      else if (currentSort === 'top') query = query.order('upvotes', { ascending: false })
      else query = query.order('upvotes', { ascending: false }).order('created_at', { ascending: false })

      const { data: posts } = await query

      // Load my votes + reactions for these posts
      if (posts?.length && currentUser) {
        const ids = posts.map(p => p.id)
        const [{ data: votes }, { data: reactions }] = await Promise.all([
          sb.from('post_votes').select('post_id,value').eq('voter_id', currentUser.id).in('post_id', ids),
          sb.from('post_reactions').select('post_id,emoji').eq('voter_id', currentUser.id).in('post_id', ids),
        ])
        votes?.forEach(v => { myVotes[v.post_id] = v.value })
        reactions?.forEach(r => {
          if (!myReactions[r.post_id]) myReactions[r.post_id] = new Set()
          myReactions[r.post_id].add(r.emoji)
        })
      }

      hasMore = (posts?.length ?? 0) === PAGE_SIZE
      document.getElementById('load-more-btn').style.display = hasMore ? 'inline-block' : 'none'

      const list = document.getElementById('posts-list')
      if (reset) list.innerHTML = ''

      if (!posts?.length && reset) {
        list.innerHTML = `<div class="empty-state"><div class="icon">💬</div><h3>No posts yet</h3><p>Be the first to post something!</p></div>`
        return
      }

      posts?.forEach(p => {
        const el = document.createElement('div')
        el.innerHTML = renderPost(p)
        list.appendChild(el.firstElementChild)
      })

      document.getElementById('post-count').textContent = reset
        ? `${posts?.length ?? 0} posts`
        : `${(page + 1) * PAGE_SIZE + (posts?.length ?? 0)} posts`
    }

    function loadMore() {
      page++
      loadPosts(false)
    }

    // ── Render post ───────────────────────────────────────────────────────────
    function renderPost(p) {
      const ago   = timeAgo(p.created_at)
      const voted = myVotes[p.id] === 1

      if (p.post_type === 'anon') {
        const reactionCounts = {}   // will be updated by reactions query separately
        const reactions = EMOJIS.map(e => {
          const reacted = myReactions[p.id]?.has(e)
          return `<button class="react-btn ${reacted ? 'reacted' : ''}" onclick="event.stopPropagation();toggleReaction('${p.id}','${e}',this)">${e}</button>`
        }).join('')

        return `
          <div class="post-card" onclick="goPost('${p.id}')">
            <div class="post-meta">
              <span class="anon-badge">🎭 Anonymous</span>
              <span class="post-cat">${escapeHtml(p.category)}</span>
              <span>${ago}</span>
            </div>
            <div class="post-body">${escapeHtml(p.content)}</div>
            <div class="reaction-bar">${reactions}</div>
            <div class="post-footer">
              <span>💬 ${p.comment_count} comments</span>
            </div>
          </div>`
      }

      // Reddit-style
      const author = p.is_anonymous ? 'Anonymous' : escapeHtml(p.profiles?.username || 'Unknown')
      const avatar = !p.is_anonymous && p.profiles?.photo_url
        ? `<img src="${escapeHtml(p.profiles.photo_url)}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0;" />`
        : `<div style="width:22px;height:22px;border-radius:50%;background:rgba(155,0,0,.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;">?</div>`

      return `
        <div class="post-card" onclick="goPost('${p.id}')">
          <div class="post-meta">
            ${avatar}
            <span style="font-weight:600;color:var(--text);">${author}</span>
            <span class="post-cat">${escapeHtml(p.category)}</span>
            <span>${ago}</span>
          </div>
          ${p.title ? `<div class="post-title">${escapeHtml(p.title)}</div>` : ''}
          <div class="post-body">${escapeHtml(p.content)}</div>
          <div class="post-footer">
            <button class="upvote-btn ${voted ? 'voted' : ''}" onclick="event.stopPropagation();toggleVote('${p.id}',this)">
              ▲ <span class="vote-num">${p.upvotes}</span>
            </button>
            <span>💬 ${p.comment_count}</span>
          </div>
        </div>`
    }

    // ── Vote ──────────────────────────────────────────────────────────────────
    async function toggleVote(postId, btn) {
      if (!currentUser) return
      const sb = getSupabase()
      const already = myVotes[postId] === 1
      const numEl = btn.querySelector('.vote-num')

      if (already) {
        await sb.from('post_votes').delete().eq('voter_id', currentUser.id).eq('post_id', postId)
        await sb.from('posts').update({ upvotes: parseInt(numEl.textContent) - 1 }).eq('id', postId)
        numEl.textContent = parseInt(numEl.textContent) - 1
        delete myVotes[postId]
        btn.classList.remove('voted')
      } else {
        await sb.from('post_votes').upsert({ voter_id: currentUser.id, post_id: postId, value: 1 }, { onConflict: 'voter_id,post_id' })
        await sb.from('posts').update({ upvotes: parseInt(numEl.textContent) + 1 }).eq('id', postId)
        numEl.textContent = parseInt(numEl.textContent) + 1
        myVotes[postId] = 1
        btn.classList.add('voted')
      }
    }

    // ── Reaction ──────────────────────────────────────────────────────────────
    async function toggleReaction(postId, emoji, btn) {
      if (!currentUser) return
      const sb = getSupabase()
      const set = myReactions[postId] || (myReactions[postId] = new Set())
      if (set.has(emoji)) {
        await sb.from('post_reactions').delete()
          .eq('voter_id', currentUser.id).eq('post_id', postId).eq('emoji', emoji)
        set.delete(emoji)
        btn.classList.remove('reacted')
      } else {
        await sb.from('post_reactions').upsert({ voter_id: currentUser.id, post_id: postId, emoji }, { onConflict: 'voter_id,post_id,emoji' })
        set.add(emoji)
        btn.classList.add('reacted')
      }
    }

    // ── Navigation ────────────────────────────────────────────────────────────
    function goPost(id) { window.location.href = `post.html?id=${id}` }

    // ── New post modal ────────────────────────────────────────────────────────
    function openNewPost() {
      setPostType(currentBoard)
      document.getElementById('post-title-input').value = ''
      document.getElementById('post-content-input').value = ''
      document.getElementById('post-error').style.display = 'none'
      document.getElementById('new-post-modal').style.display = 'flex'
    }
    function closeNewPost() { document.getElementById('new-post-modal').style.display = 'none' }

    function setPostType(type) {
      postType = type
      document.getElementById('title-wrap').style.display = type === 'reddit' ? 'block' : 'none'
      document.querySelectorAll('#type-selector .tab-btn').forEach((b, i) =>
        b.classList.toggle('active', ['anon','reddit'][i] === type)
      )
      document.getElementById('modal-subtitle').textContent =
        type === 'anon'
          ? 'Your identity is hidden — no one will know it was you.'
          : 'Posted under your profile name.'
    }

    // char counter
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('post-content-input').addEventListener('input', function() {
        document.getElementById('char-count').textContent = `${this.value.length}/2000`
      })
    })

    async function submitPost() {
      const title   = document.getElementById('post-title-input').value.trim()
      const content = document.getElementById('post-content-input').value.trim()
      const category = document.getElementById('post-cat-input').value
      const errEl   = document.getElementById('post-error')
      errEl.style.display = 'none'

      if (!content) { errEl.textContent = 'Please write something.'; errEl.style.display = 'block'; return }
      if (postType === 'reddit' && !title) { errEl.textContent = 'Please add a title.'; errEl.style.display = 'block'; return }

      const payload = {
        author_id:    postType === 'anon' ? null : currentUser.id,
        is_anonymous: postType === 'anon',
        title:        postType === 'reddit' ? title : null,
        content, category,
        post_type:    postType,
      }

      const { error } = await getSupabase().from('posts').insert(payload)
      if (error) { errEl.textContent = 'Failed to post: ' + error.message; errEl.style.display = 'block'; return }

      closeNewPost()
      showToast('Posted!', 'success')
      if (currentBoard === postType) { page = 0; hasMore = true; loadPosts(true) }
      else switchBoard(postType)
    }

    // ── Realtime new posts ────────────────────────────────────────────────────
    function subscribeNewPosts() {
      getSupabase().channel('discuss-feed')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, payload => {
          if (payload.new.post_type !== currentBoard) return
          if (currentCat && payload.new.category !== currentCat) return
          if (currentSort === 'new' && page === 0) {
            page = 0; hasMore = true; loadPosts(true)
          }
        })
        .subscribe()
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function renderSkeletons() {
      return Array(4).fill(0).map(() =>
        `<div class="skeleton" style="height:110px;border-radius:16px;"></div>`
      ).join('')
    }

    function timeAgo(ts) {
      const s = Math.floor((Date.now() - new Date(ts)) / 1000)
      if (s < 60) return 'just now'
      if (s < 3600)  return Math.floor(s/60)  + 'm ago'
      if (s < 86400) return Math.floor(s/3600) + 'h ago'
      return Math.floor(s/86400) + 'd ago'
    }

    init()
  </script>
</body>
</html>
