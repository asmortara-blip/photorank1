<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#9B0000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maroon Match – Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="common.js"></script>
  <style>
    .post-full { background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px; }
    .post-meta { display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-bottom:14px;flex-wrap:wrap; }
    .post-cat  { background:rgba(155,0,0,.12);color:#FECACA;border:1px solid rgba(155,0,0,.25);border-radius:999px;padding:2px 10px;font-size:11px;font-weight:600; }
    .post-title-full { font-size:clamp(20px,4vw,28px);font-weight:800;letter-spacing:-.02em;line-height:1.3;margin-bottom:14px; }
    .post-content-full { font-size:15px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word; }

    .upvote-btn {
      display:inline-flex;align-items:center;gap:6px;padding:8px 20px;
      border-radius:999px;border:1px solid var(--border);background:none;
      color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;
    }
    .upvote-btn:hover,.upvote-btn.voted { background:rgba(155,0,0,.12);border-color:rgba(155,0,0,.4);color:#FECACA; }

    .reaction-bar { display:flex;gap:6px;flex-wrap:wrap;margin-top:14px; }
    .react-btn { padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:none;font-size:15px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-weight:500; }
    .react-btn:hover { background:rgba(255,255,255,.06); }
    .react-btn.reacted { background:rgba(155,0,0,.12);border-color:rgba(155,0,0,.3);color:#FECACA; }
    .react-count { font-size:13px; }

    /* ── Comments ──────────────────────────────────────────────────────── */
    .comment-wrap { display:flex;flex-direction:column;gap:2px; }
    .comment-item {
      padding:14px 16px;border-radius:14px;border:1px solid transparent;transition:border-color .15s;
    }
    .comment-item:hover { border-color:var(--border); }
    .comment-item.is-reply { margin-left:32px;border-left:2px solid var(--border);border-radius:0 14px 14px 0; }
    .comment-meta { display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:6px; }
    .comment-body { font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word; }
    .comment-actions { display:flex;align-items:center;gap:12px;margin-top:8px;font-size:12px; }
    .comment-act-btn { background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;font-weight:500;padding:2px 4px;border-radius:4px;transition:color .15s; }
    .comment-act-btn:hover { color:var(--text); }
    .comment-upvote { display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s; }
    .comment-upvote:hover,.comment-upvote.voted { background:rgba(155,0,0,.1);border-color:rgba(155,0,0,.3);color:#FECACA; }

    /* ── Reply form ─────────────────────────────────────────────────────── */
    .reply-form { margin-top:8px;margin-left:32px;display:none; }
    .reply-form.open { display:block; }

    /* ── Comment input ──────────────────────────────────────────────────── */
    #comment-box {
      width:100%;min-height:80px;resize:vertical;
      background:rgba(255,255,255,.05);border:1px solid var(--border);
      border-radius:12px;color:var(--text);font-size:14px;line-height:1.6;
      padding:12px 14px;outline:none;transition:border-color .2s;font-family:inherit;
    }
    #comment-box:focus { border-color:rgba(155,0,0,.5); }

    /* ── Anon post style ────────────────────────────────────────────────── */
    .anon-badge { background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:999px;padding:2px 10px;font-size:11px;font-weight:600;color:var(--muted); }
  </style>
</head>
<body>

  <nav class="glass-nav">
    <div style="max-width:760px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;">
      <a href="index.html" style="font-size:18px;font-weight:800;letter-spacing:-.02em;text-decoration:none;color:inherit;">Maroon <span class="grad-text">Match</span></a>
      <div style="display:flex;gap:8px;align-items:center;">
        <a href="discuss.html" style="color:var(--muted);text-decoration:none;font-size:14px;padding:6px 12px;border-radius:8px;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">← Discuss</a>
        <div id="nav-actions" style="display:flex;gap:8px;align-items:center;"></div>
      </div>
    </div>
  </nav>

  <div style="max-width:760px;margin:0 auto;padding:28px 24px 100px;" id="page-wrap">
    <!-- Skeleton -->
    <div id="skel">
      <div class="skeleton" style="height:200px;border-radius:20px;margin-bottom:24px;"></div>
      <div class="skeleton" style="height:60px;border-radius:14px;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:60px;border-radius:14px;"></div>
    </div>

    <!-- Post -->
    <div id="post-area" style="display:none;"></div>

    <!-- Comments section -->
    <div id="comments-area" style="display:none;margin-top:28px;">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;" id="comment-count-label">Comments</h3>

      <!-- Add comment -->
      <div style="margin-bottom:24px;">
        <textarea id="comment-box" placeholder="Add a comment…" maxlength="1000"></textarea>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
          <p style="font-size:11px;color:var(--muted);" id="comment-anon-note"></p>
          <button onclick="submitComment()" class="btn-accent" style="font-size:13px;padding:9px 20px;">Post Comment</button>
        </div>
      </div>

      <!-- Comments list -->
      <div id="comments-list" class="comment-wrap"></div>
    </div>
  </div>

  <!-- Mobile nav -->
  <nav class="mobile-nav">
    <a href="vote.html" class="mobile-nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Vote</a>
    <a href="leaderboard.html" class="mobile-nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Ranks</a>
    <a href="discuss.html" class="mobile-nav-item active"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>Discuss</a>
    <a href="search.html" class="mobile-nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>Search</a>
    <a href="profile.html" class="mobile-nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Profile</a>
  </nav>

  <script>
    const EMOJIS = ['🔥','💀','😭','👀','💯','🙏','😂','🤔']
    let postId = null, currentUser = null, postData = null
    let replyingTo = null
    let myVote = 0, myReactions = new Set(), myCommentVotes = {}
    let reactionCounts = {}

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {})
    initNav()

    async function init() {
      const { data: { user } } = await getSupabase().auth.getUser()
      if (!user) { window.location.href = 'index.html'; return }
      currentUser = user

      postId = new URLSearchParams(location.search).get('id')
      if (!postId) { window.location.href = 'discuss.html'; return }

      await Promise.all([loadPost(), loadComments()])
    }

    // ── Load post ─────────────────────────────────────────────────────────────
    async function loadPost() {
      const sb = getSupabase()
      const { data: p } = await sb.from('posts')
        .select('*,profiles(username,photo_url)')
        .eq('id', postId).single()

      if (!p) { window.location.href = 'discuss.html'; return }
      postData = p
      document.title = `Maroon Match – ${p.title || 'Post'}`

      // My vote + reactions
      const [{ data: vt }, { data: rxs }, { data: rxCounts }] = await Promise.all([
        sb.from('post_votes').select('value').eq('voter_id', currentUser.id).eq('post_id', postId).single(),
        sb.from('post_reactions').select('emoji').eq('voter_id', currentUser.id).eq('post_id', postId),
        sb.from('post_reactions').select('emoji').eq('post_id', postId),
      ])
      myVote = vt?.value || 0
      rxs?.forEach(r => myReactions.add(r.emoji))
      rxCounts?.forEach(r => { reactionCounts[r.emoji] = (reactionCounts[r.emoji] || 0) + 1 })

      // Render
      document.getElementById('skel').style.display = 'none'
      document.getElementById('post-area').style.display = 'block'
      document.getElementById('comments-area').style.display = 'block'

      // Comment anonymous note
      if (p.post_type === 'anon') {
        document.getElementById('comment-anon-note').textContent = 'Comments on anonymous posts are also anonymous'
      }

      document.getElementById('post-area').innerHTML = renderFullPost(p)
    }

    function renderFullPost(p) {
      const isAnon = p.is_anonymous || p.post_type === 'anon'
      const author = isAnon
        ? `<span class="anon-badge">🎭 Anonymous</span>`
        : `${p.profiles?.photo_url ? `<img src="${escapeHtml(p.profiles.photo_url)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;" />` : ''}
           <a href="profile.html?id=${p.author_id}" style="font-weight:600;color:var(--text);text-decoration:none;">${escapeHtml(p.profiles?.username || 'Unknown')}</a>`

      const reactions = EMOJIS.map(e => {
        const cnt = reactionCounts[e] || 0
        const active = myReactions.has(e)
        return `<button class="react-btn ${active ? 'reacted' : ''}" onclick="toggleReaction('${e}',this)">
          ${e} ${cnt > 0 ? `<span class="react-count">${cnt}</span>` : ''}
        </button>`
      }).join('')

      const voteSection = p.post_type === 'anon'
        ? `<div class="reaction-bar">${reactions}</div>`
        : `<button class="upvote-btn ${myVote === 1 ? 'voted' : ''}" onclick="toggleVote(this)">
             ▲ <span id="vote-num">${p.upvotes}</span> upvotes
           </button>`

      return `
        <div class="post-full">
          <div class="post-meta">
            ${author}
            <span class="post-cat">${escapeHtml(p.category)}</span>
            <span>${timeAgo(p.created_at)}</span>
          </div>
          ${p.title ? `<div class="post-title-full">${escapeHtml(p.title)}</div>` : ''}
          <div class="post-content-full">${escapeHtml(p.content)}</div>
          <div style="margin-top:16px;">${voteSection}</div>
        </div>`
    }

    // ── Load comments ─────────────────────────────────────────────────────────
    async function loadComments() {
      const sb = getSupabase()
      const { data: comments } = await sb.from('comments')
        .select('*,profiles(username,photo_url)')
        .eq('post_id', postId)
        .order('created_at', { ascending: true })

      if (!comments) return

      // My comment votes
      const ids = comments.map(c => c.id)
      if (ids.length) {
        const { data: cvotes } = await sb.from('comment_votes')
          .select('comment_id,value').eq('voter_id', currentUser.id).in('comment_id', ids)
        cvotes?.forEach(v => { myCommentVotes[v.comment_id] = v.value })
      }

      const label = document.getElementById('comment-count-label')
      label.textContent = `${comments.length} Comment${comments.length !== 1 ? 's' : ''}`

      // Build tree
      const roots  = comments.filter(c => !c.parent_id)
      const byPid  = {}
      comments.filter(c => c.parent_id).forEach(c => {
        if (!byPid[c.parent_id]) byPid[c.parent_id] = []
        byPid[c.parent_id].push(c)
      })

      const list = document.getElementById('comments-list')
      list.innerHTML = roots.map(c => renderComment(c, byPid, false)).join('')
    }

    function renderComment(c, byPid, isReply) {
      const isAnon = c.is_anonymous || postData?.post_type === 'anon'
      const author = isAnon
        ? `<span class="anon-badge" style="font-size:10px;">🎭 Anon</span>`
        : `${c.profiles?.photo_url ? `<img src="${escapeHtml(c.profiles.photo_url)}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0;" />` : ''}
           <a href="profile.html?id=${c.author_id}" style="font-weight:600;font-size:13px;color:var(--text);text-decoration:none;">${escapeHtml(c.profiles?.username || 'Unknown')}</a>`

      const voted = myCommentVotes[c.id] === 1
      const replies = (byPid[c.id] || []).map(r => renderComment(r, byPid, true)).join('')

      return `
        <div class="comment-item ${isReply ? 'is-reply' : ''}" id="c-${c.id}">
          <div class="comment-meta">${author}<span>${timeAgo(c.created_at)}</span></div>
          <div class="comment-body">${escapeHtml(c.content)}</div>
          <div class="comment-actions">
            <button class="comment-upvote ${voted ? 'voted' : ''}" onclick="toggleCommentVote('${c.id}',this)">
              ▲ <span class="cv-num">${c.upvotes}</span>
            </button>
            ${!isReply ? `<button class="comment-act-btn" onclick="startReply('${c.id}')">Reply</button>` : ''}
            ${c.author_id === currentUser.id ? `<button class="comment-act-btn" style="color:#f87171;" onclick="deleteComment('${c.id}')">Delete</button>` : ''}
          </div>
          ${!isReply ? `<div id="reply-form-${c.id}" class="reply-form">
            <textarea class="input" id="reply-input-${c.id}" rows="2" maxlength="500" placeholder="Write a reply…" style="font-size:13px;margin-bottom:6px;"></textarea>
            <div style="display:flex;gap:8px;">
              <button onclick="submitReply('${c.id}')" class="btn-accent" style="font-size:12px;padding:7px 16px;">Reply</button>
              <button onclick="cancelReply('${c.id}')" class="btn-ghost" style="font-size:12px;padding:7px 14px;">Cancel</button>
            </div>
          </div>` : ''}
          ${replies}
        </div>`
    }

    // ── Submit comment ────────────────────────────────────────────────────────
    async function submitComment(content = null, parentId = null) {
      const text = content || document.getElementById('comment-box').value.trim()
      if (!text) return

      const isAnon = postData?.post_type === 'anon'
      const { error } = await getSupabase().from('comments').insert({
        post_id:      postId,
        author_id:    isAnon ? null : currentUser.id,
        is_anonymous: isAnon,
        parent_id:    parentId || null,
        content:      text,
      })

      if (error) { showToast('Failed to post comment', 'error'); return }

      // Increment comment count
      await getSupabase().from('posts').update({ comment_count: (postData.comment_count || 0) + 1 }).eq('id', postId)
      postData.comment_count = (postData.comment_count || 0) + 1

      if (!content) document.getElementById('comment-box').value = ''
      showToast('Comment posted!', 'success')
      await loadComments()
    }

    // ── Reply ─────────────────────────────────────────────────────────────────
    function startReply(cid) {
      document.querySelectorAll('.reply-form').forEach(f => f.classList.remove('open'))
      document.getElementById(`reply-form-${cid}`).classList.add('open')
      document.getElementById(`reply-input-${cid}`).focus()
    }
    function cancelReply(cid) { document.getElementById(`reply-form-${cid}`).classList.remove('open') }
    async function submitReply(cid) {
      const text = document.getElementById(`reply-input-${cid}`).value.trim()
      if (!text) return
      await submitComment(text, cid)
      cancelReply(cid)
    }

    // ── Delete comment ────────────────────────────────────────────────────────
    async function deleteComment(cid) {
      if (!confirm('Delete this comment?')) return
      await getSupabase().from('comments').delete().eq('id', cid)
      await loadComments()
    }

    // ── Post vote ─────────────────────────────────────────────────────────────
    async function toggleVote(btn) {
      const numEl = document.getElementById('vote-num')
      const sb = getSupabase()
      if (myVote === 1) {
        await sb.from('post_votes').delete().eq('voter_id', currentUser.id).eq('post_id', postId)
        await sb.from('posts').update({ upvotes: parseInt(numEl.textContent) - 1 }).eq('id', postId)
        numEl.textContent = parseInt(numEl.textContent) - 1
        myVote = 0; btn.classList.remove('voted')
      } else {
        await sb.from('post_votes').upsert({ voter_id: currentUser.id, post_id: postId, value: 1 }, { onConflict: 'voter_id,post_id' })
        await sb.from('posts').update({ upvotes: parseInt(numEl.textContent) + 1 }).eq('id', postId)
        numEl.textContent = parseInt(numEl.textContent) + 1
        myVote = 1; btn.classList.add('voted')
      }
    }

    // ── Reaction ──────────────────────────────────────────────────────────────
    async function toggleReaction(emoji, btn) {
      const sb = getSupabase()
      const cntEl = btn.querySelector('.react-count')
      let cnt = reactionCounts[emoji] || 0

      if (myReactions.has(emoji)) {
        await sb.from('post_reactions').delete().eq('voter_id', currentUser.id).eq('post_id', postId).eq('emoji', emoji)
        myReactions.delete(emoji); reactionCounts[emoji] = Math.max(0, cnt - 1)
        btn.classList.remove('reacted')
        if (cntEl) cntEl.textContent = reactionCounts[emoji] || ''
        if (!reactionCounts[emoji] && cntEl) cntEl.remove()
      } else {
        await sb.from('post_reactions').upsert({ voter_id: currentUser.id, post_id: postId, emoji }, { onConflict: 'voter_id,post_id,emoji' })
        myReactions.add(emoji); reactionCounts[emoji] = cnt + 1
        btn.classList.add('reacted')
        if (cntEl) cntEl.textContent = reactionCounts[emoji]
        else btn.innerHTML += `<span class="react-count">${reactionCounts[emoji]}</span>`
      }
    }

    // ── Comment vote ──────────────────────────────────────────────────────────
    async function toggleCommentVote(cid, btn) {
      const numEl = btn.querySelector('.cv-num')
      const sb = getSupabase()
      const already = myCommentVotes[cid] === 1
      if (already) {
        await sb.from('comment_votes').delete().eq('voter_id', currentUser.id).eq('comment_id', cid)
        await sb.from('comments').update({ upvotes: parseInt(numEl.textContent) - 1 }).eq('id', cid)
        numEl.textContent = parseInt(numEl.textContent) - 1
        delete myCommentVotes[cid]; btn.classList.remove('voted')
      } else {
        await sb.from('comment_votes').upsert({ voter_id: currentUser.id, comment_id: cid, value: 1 }, { onConflict: 'voter_id,comment_id' })
        await sb.from('comments').update({ upvotes: parseInt(numEl.textContent) + 1 }).eq('id', cid)
        numEl.textContent = parseInt(numEl.textContent) + 1
        myCommentVotes[cid] = 1; btn.classList.add('voted')
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function timeAgo(ts) {
      const s = Math.floor((Date.now() - new Date(ts)) / 1000)
      if (s < 60) return 'just now'
      if (s < 3600)  return Math.floor(s/60)  + 'm ago'
      if (s < 86400) return Math.floor(s/3600) + 'h ago'
      return Math.floor(s/86400) + 'd ago'
    }

    init()
  </script>
</body>
</html>
